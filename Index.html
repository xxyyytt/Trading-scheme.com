<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Trading Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .status {
      margin-top: 10px;
      color: #10b981;
    }
  </style>
</head>

<body>

  <header>
    Deriv Trading Dashboard
  </header>

  <div class="container">

    <div class="card">
      <h2>Account Status</h2>
      <p id="balance">Balance: Not connected</p>
    </div>

    <div class="card">
      <h2>Market Actions</h2>
      <button onclick="connectDeriv()">Connect Deriv</button>
      <button onclick="demoTrade()">Test Trade</button>

      <div class="status" id="status"></div>
    </div>

  </div>

  <script>
    let ws;

    function connectDeriv() {
      ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

      ws.onopen = function () {
        document.getElementById("status").innerText = "Connected to Deriv API";
      };

      ws.onmessage = function (msg) {
        const data = JSON.parse(msg.data);

        if (data.msg_type === "balance") {
          document.getElementById("balance").innerText =
            "Balance: " + data.balance.balance + " " + data.balance.currency;
        }
      };

      ws.onerror = function () {
        document.getElementById("status").innerText = "Connection error";
      };
    }

    function demoTrade() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Connect first!");
        return;
      }

      ws.send(JSON.stringify({
        balance: 1,
        subscribe: 1
      }));

      document.getElementById("status").innerText = "Request sent...";
    }
  </script>

</body>
</html>
